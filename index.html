<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ioanBudget">
    <meta name="theme-color" content="#4338ca">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234338ca'/><text y='68' x='50' text-anchor='middle' font-size='55' font-family='system-ui'>&#9889;</text></svg>">
    <title>Budget 50/30/20</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/twemoji.min.js"></script>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
    *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    html {
        -webkit-text-size-adjust: 100%;
    }

    body {
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        -webkit-font-smoothing: antialiased;
    }

    img.emoji {
        height: 1em;
        width: 1em;
        margin: 0 .05em 0 .1em;
        vertical-align: -0.1em;
    }

    .topbar {
        background: linear-gradient(135deg, #1e1b4b 0%, #312e81 40%, #4338ca 75%, #6366f1 100%);
        padding: max(env(safe-area-inset-top), 16px) 16px 0;
        position: relative;
        overflow: hidden;
    }

    .topbar::before {
        content: '';
        position: absolute;
        top: -60px;
        right: -30px;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: rgba(99, 102, 241, 0.15);
    }

    .topbar::after {
        content: '';
        position: absolute;
        bottom: -40px;
        left: -20px;
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: rgba(139, 92, 246, 0.12);
    }

    .topbar-inner {
        padding: 10px 0 0;
        position: relative;
        z-index: 1;
    }

    .topbar h1 {
        font-size: clamp(1.15rem, 5vw, 1.5rem);
        font-weight: 700;
        color: white;
        margin-bottom: 2px;
    }

    .topbar p {
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.78rem;
        margin-bottom: 14px;
    }

    .income-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 10px 14px;
        margin-bottom: 14px;
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .income-bar label {
        color: rgba(255, 255, 255, 0.85);
        font-size: 0.8rem;
        font-weight: 600;
        white-space: nowrap;
        flex-shrink: 0;
    }

    .income-bar input {
        border: none;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.15);
        color: white;
        padding: 7px 10px;
        font-size: 1.05rem;
        font-weight: 700;
        flex: 1;
        min-width: 0;
        outline: none;
        text-align: center;
        -webkit-appearance: none;
        font-family: inherit;
    }

    .income-bar span {
        color: rgba(255, 255, 255, 0.7);
        font-size: 0.9rem;
        font-weight: 600;
        flex-shrink: 0;
    }

    .section-switcher {
        background: linear-gradient(135deg, #1e1b4b 0%, #312e81 40%, #4338ca 75%, #6366f1 100%);
        padding: 0 16px;
        display: flex;
        gap: 6px;
    }

    .sec-tab {
        flex: 1;
        padding: 10px 6px;
        border-radius: 12px 12px 0 0;
        font-size: clamp(0.72rem, 3.2vw, 0.85rem);
        font-weight: 700;
        cursor: pointer;
        border: none;
        transition: all 0.2s;
        text-align: center;
        line-height: 1.4;
        -webkit-tap-highlight-color: transparent;
    }

    .sec-tab.budget {
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.65);
    }

    .sec-tab.budget.active {
        background: #0f1117;
        color: #818cf8;
    }

    .sec-tab.travel {
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.65);
    }

    .sec-tab.travel.active {
        background: #0d1f2d;
        color: #38bdf8;
    }

    .content {
        padding: 16px 16px max(env(safe-area-inset-bottom), 28px);
    }

    .content.budget-bg {
        background: #0f1117;
    }

    .content.travel-bg {
        background: #0d1f2d;
    }

    .month-selector {
        background: #1e2130;
        border-radius: 16px;
        padding: 14px 16px;
        box-shadow: 0 4px 20px rgba(99, 102, 241, 0.15);
        margin-bottom: 14px;
        border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .month-selector-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
    }

    .month-selector-title {
        font-size: 0.85rem;
        font-weight: 700;
        color: #e2e8f0;
    }

    .month-badge {
        background: linear-gradient(135deg, #4338ca, #7c3aed);
        color: white;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 700;
        padding: 4px 12px;
    }

    .month-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
    }

    .month-btn {
        padding: 8px 4px;
        border-radius: 10px;
        border: 1.5px solid rgba(99, 102, 241, 0.25);
        background: #252840;
        font-size: 0.75rem;
        font-weight: 600;
        color: #818cf8;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
        font-family: inherit;
        -webkit-tap-highlight-color: transparent;
        position: relative;
    }

    .month-btn.active {
        background: linear-gradient(135deg, #4338ca, #7c3aed);
        color: white;
        border-color: transparent;
        box-shadow: 0 2px 10px rgba(99, 102, 241, 0.4);
    }

    .month-btn.has-data::after {
        content: '';
        position: absolute;
        top: 4px;
        right: 4px;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #34d399;
    }

    .month-btn.active.has-data::after {
        background: rgba(255, 255, 255, 0.7);
    }

    .month-year {
        font-size: 0.6rem;
        opacity: 0.7;
        display: block;
        margin-top: 1px;
    }

    .summary-box {
        background: #1e2130;
        border-radius: 20px;
        padding: 18px;
        box-shadow: 0 4px 24px rgba(99, 102, 241, 0.12);
        margin-bottom: 14px;
        border: 1px solid rgba(99, 102, 241, 0.15);
    }

    .summary-box h2 {
        font-size: 0.88rem;
        font-weight: 700;
        color: #818cf8;
        margin-bottom: 14px;
    }

    .split-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        margin-bottom: 16px;
    }

    .split-card {
        border-radius: 14px;
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .split-card.needs {
        background: linear-gradient(135deg, #1e3a5f, #1e40af);
        border: 1px solid rgba(59, 130, 246, 0.4);
    }

    .split-card.wants {
        background: linear-gradient(135deg, #2e1065, #4c1d95);
        border: 1px solid rgba(139, 92, 246, 0.4);
    }

    .split-card.future {
        background: linear-gradient(135deg, #164e63, #0e7490);
        border: 1px solid rgba(6, 182, 212, 0.4);
    }

    .split-card.left {
        background: linear-gradient(135deg, #064e3b, #065f46);
        border: 1px solid rgba(52, 211, 153, 0.4);
    }

    .split-card.left.neg {
        background: linear-gradient(135deg, #450a0a, #7f1d1d);
        border: 1px solid rgba(239, 68, 68, 0.4);
    }

    .split-label {
        font-size: 0.63rem;
        color: rgba(226, 232, 240, 0.5);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-weight: 600;
    }

    .split-amount {
        font-size: 1.05rem;
        font-weight: 700;
        color: #f1f5f9;
    }

    .split-pct {
        font-size: 0.7rem;
        font-weight: 700;
    }

    .split-card.needs .split-pct {
        color: #60a5fa;
    }

    .split-card.wants .split-pct {
        color: #a78bfa;
    }

    .split-card.future .split-pct {
        color: #22d3ee;
    }

    .split-card.left .split-pct {
        color: #34d399;
    }

    .split-card.left.neg .split-pct {
        color: #f87171;
    }

    .split-ideal {
        font-size: 0.63rem;
        color: rgba(226, 232, 240, 0.35);
    }

    .progress-section {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .prog-row {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .prog-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .prog-label {
        font-size: 0.75rem;
        font-weight: 600;
        color: #cbd5e1;
    }

    .prog-vals {
        font-size: 0.7rem;
        color: #6366f1;
    }

    .prog-track {
        height: 8px;
        background: rgba(99, 102, 241, 0.15);
        border-radius: 20px;
        overflow: hidden;
    }

    .prog-fill {
        height: 100%;
        border-radius: 20px;
        transition: width 0.5s ease;
    }

    .prog-fill.needs {
        background: linear-gradient(90deg, #2563eb, #60a5fa);
    }

    .prog-fill.wants {
        background: linear-gradient(90deg, #7c3aed, #a78bfa);
    }

    .prog-fill.future {
        background: linear-gradient(90deg, #0891b2, #22d3ee);
    }

    .prog-fill.over {
        background: linear-gradient(90deg, #dc2626, #f87171);
    }

    .bucket {
        background: #1e2130;
        border-radius: 18px;
        padding: 16px;
        box-shadow: 0 4px 16px rgba(99, 102, 241, 0.1);
        margin-bottom: 12px;
        overflow: hidden;
        border: 1px solid rgba(99, 102, 241, 0.12);
    }

    .bucket-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
    }

    .bucket-title-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .bucket-icon {
        font-size: 1.3rem;
    }

    .bucket-title {
        font-size: 0.95rem;
        font-weight: 700;
        color: #e2e8f0;
    }

    .bucket-badge {
        font-size: 0.65rem;
        font-weight: 700;
        padding: 3px 9px;
        border-radius: 20px;
        color: white;
    }

    .bucket-badge.needs {
        background: linear-gradient(135deg, #1d4ed8, #3b82f6);
    }

    .bucket-badge.wants {
        background: linear-gradient(135deg, #6d28d9, #8b5cf6);
    }

    .bucket-badge.future {
        background: linear-gradient(135deg, #0e7490, #06b6d4);
    }

    .bucket-total {
        font-size: 0.9rem;
        font-weight: 700;
        color: #818cf8;
    }

    .bucket-chevron {
        color: #4338ca;
        font-size: 0.75rem;
        transition: transform 0.2s;
        margin-left: 6px;
    }

    .bucket.collapsed .bucket-chevron {
        transform: rotate(-90deg);
    }

    .bucket.collapsed .bucket-body {
        display: none;
    }

    .items-wrap {
        border-top: 1px solid rgba(99, 102, 241, 0.1);
        padding-top: 8px;
    }

    .item-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 0;
        border-bottom: 1px solid rgba(99, 102, 241, 0.08);
    }

    .item-row:last-child {
        border-bottom: none;
    }

    .item-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
    }

    .item-dot.needs {
        background: #3b82f6;
    }

    .item-dot.wants {
        background: #8b5cf6;
    }

    .item-dot.future {
        background: #06b6d4;
    }

    .item-name {
        flex: 1;
        font-size: 0.8rem;
        color: #94a3b8;
        border: none;
        background: transparent;
        outline: none;
        font-family: inherit;
        min-width: 0;
    }

    .item-name::placeholder {
        color: #334155;
    }

    .item-amount {
        width: 88px;
        text-align: right;
        font-size: 0.82rem;
        font-weight: 600;
        color: #e2e8f0;
        border: 1.5px solid rgba(99, 102, 241, 0.2);
        background: #252840;
        border-radius: 10px;
        padding: 5px 8px;
        outline: none;
        font-family: inherit;
        -webkit-appearance: none;
        transition: border 0.2s;
    }

    .item-amount:focus {
        border-color: #6366f1;
        background: #1e2130;
    }

    .item-currency {
        font-size: 0.72rem;
        color: #6366f1;
        flex-shrink: 0;
        font-weight: 600;
    }

    .add-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 0.76rem;
        font-weight: 700;
        background: none;
        border: none;
        cursor: pointer;
        padding: 8px 0 2px;
        -webkit-tap-highlight-color: transparent;
        font-family: inherit;
    }

    .add-btn.needs {
        color: #3b82f6;
    }

    .add-btn.wants {
        color: #8b5cf6;
    }

    .add-btn.future {
        color: #06b6d4;
    }

    .del-btn {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        flex-shrink: 0;
        background: rgba(239, 68, 68, 0.1);
        border: 1.5px solid rgba(239, 68, 68, 0.3);
        color: #f87171;
        font-size: 1rem;
        font-weight: 700;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
    }

    .del-btn:active {
        background: #dc2626;
        color: white;
    }

    .undo-btn {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 0.72rem;
        font-weight: 600;
        color: #475569;
        background: none;
        border: none;
        cursor: pointer;
        padding: 8px 0 2px;
        font-family: inherit;
        -webkit-tap-highlight-color: transparent;
    }

    .vac-header-box {
        background: linear-gradient(135deg, #0c1a2e, #0f2d4a);
        border-radius: 18px;
        padding: 16px 18px;
        margin-bottom: 14px;
        border: 1px solid rgba(56, 189, 248, 0.2);
    }

    .vac-header-box h2 {
        font-size: 0.95rem;
        font-weight: 700;
        color: #38bdf8;
        margin-bottom: 4px;
    }

    .vac-header-box p {
        font-size: 0.78rem;
        color: #7dd3fc;
        line-height: 1.5;
    }

    .grand-total-bar {
        background: linear-gradient(135deg, #0369a1, #0891b2);
        border-radius: 14px;
        padding: 14px 18px;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 4px 16px rgba(8, 145, 178, 0.3);
    }

    .grand-total-label {
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.8);
        font-weight: 600;
    }

    .grand-total-amount {
        font-size: 1.25rem;
        font-weight: 700;
        color: white;
    }

    .trip-card {
        background: #1e2130;
        border-radius: 18px;
        padding: 16px;
        box-shadow: 0 4px 16px rgba(56, 189, 248, 0.08);
        margin-bottom: 12px;
        border: 1px solid rgba(56, 189, 248, 0.12);
    }

    .trip-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
        gap: 10px;
    }

    .trip-name-input {
        font-size: 0.95rem;
        font-weight: 700;
        color: #e2e8f0;
        border: none;
        background: transparent;
        outline: none;
        font-family: inherit;
        flex: 1;
        min-width: 0;
    }

    .trip-name-input::placeholder {
        color: #1e3a5f;
        font-weight: 400;
    }

    .trip-total-badge {
        background: linear-gradient(135deg, #0369a1, #0284c7);
        color: white;
        border-radius: 20px;
        font-size: 0.78rem;
        font-weight: 700;
        padding: 5px 12px;
        flex-shrink: 0;
    }

    .trip-section {
        margin-bottom: 12px;
    }

    .trip-section-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #38bdf8;
        margin-bottom: 6px;
        padding: 5px 10px;
        background: rgba(56, 189, 248, 0.08);
        border-radius: 8px;
        border-left: 3px solid #0891b2;
    }

    .trip-section-sub {
        font-size: 0.7rem;
        font-weight: 700;
        color: #0ea5e9;
    }

    .vac-item-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 0;
        border-bottom: 1px solid rgba(56, 189, 248, 0.08);
    }

    .vac-item-row:last-child {
        border-bottom: none;
    }

    .vac-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #0369a1;
        flex-shrink: 0;
    }

    .vac-item-name {
        flex: 1;
        font-size: 0.8rem;
        color: #94a3b8;
        border: none;
        background: transparent;
        outline: none;
        font-family: inherit;
        min-width: 0;
    }

    .vac-item-name::placeholder {
        color: #1e3a5f;
    }

    .vac-item-amount {
        width: 88px;
        text-align: right;
        font-size: 0.82rem;
        font-weight: 600;
        color: #38bdf8;
        border: 1.5px solid rgba(56, 189, 248, 0.2);
        background: #0c1a2e;
        border-radius: 10px;
        padding: 5px 8px;
        outline: none;
        font-family: inherit;
        -webkit-appearance: none;
        transition: border 0.2s;
    }

    .vac-item-amount:focus {
        border-color: #38bdf8;
        background: #0f2d4a;
    }

    .vac-currency {
        font-size: 0.72rem;
        color: #0ea5e9;
        flex-shrink: 0;
        font-weight: 600;
    }

    .vac-del-btn {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        flex-shrink: 0;
        background: rgba(239, 68, 68, 0.1);
        border: 1.5px solid rgba(239, 68, 68, 0.25);
        color: #f87171;
        font-size: 0.9rem;
        font-weight: 700;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
    }

    .vac-del-btn:active {
        background: #dc2626;
        color: white;
    }

    .vac-add-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        color: #0ea5e9;
        font-size: 0.75rem;
        font-weight: 700;
        background: none;
        border: none;
        cursor: pointer;
        padding: 6px 0 2px;
        -webkit-tap-highlight-color: transparent;
        font-family: inherit;
    }

    .del-trip-btn {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 0.72rem;
        font-weight: 600;
        color: #475569;
        background: none;
        border: none;
        cursor: pointer;
        font-family: inherit;
        -webkit-tap-highlight-color: transparent;
    }

    .trip-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid rgba(56, 189, 248, 0.1);
    }

    .chip {
        background: rgba(56, 189, 248, 0.08);
        border: 1px solid rgba(56, 189, 248, 0.2);
        border-radius: 20px;
        font-size: 0.7rem;
        padding: 4px 10px;
        color: #38bdf8;
        font-weight: 600;
    }

    .add-trip-btn {
        width: 100%;
        padding: 14px;
        border-radius: 14px;
        background: #1e2130;
        border: 2px dashed rgba(56, 189, 248, 0.25);
        color: #0ea5e9;
        font-size: 0.85rem;
        font-weight: 700;
        cursor: pointer;
        margin-bottom: 12px;
        font-family: inherit;
        -webkit-tap-highlight-color: transparent;
    }/* PWA NAV */

    .pwa-nav {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(30, 33, 48, 0.97);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-top: 1px solid rgba(99, 102, 241, 0.25);
        padding: 8px 0 max(env(safe-area-inset-bottom), 8px);
        z-index: 1000;
        justify-content: space-around;
        align-items: center;
    }

    .pwa-nav.visible {
        display: flex;
    }

    .pwa-nav-btn {
        display: flex;
        flex-direction: column;

    </div>
    <script>

    function defaultBuckets() {

            needs: {

    function getMonthData(mk) {
        if (!allMonths[mk])
            allMonths[mk] = {
                buckets: defaultBuckets(),
                income: '3300'
            };
        return allMonths[mk];
    }
    function B() {
        return getMonthData(currentMonth).buckets;
    }
    function toNum(v) {
        return parseFloat((v + '').replace(',', '.')) || 0;
    }
    function fmt(n) {
        var f = parseFloat(n) || 0;
        return f.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }
    function getIncome() {
        return toNum(document.getElementById('income').value);
    }
    function bucketTotal(k) {
        return B()[k].items.reduce(function(s, it) {
            return s + toNum(it.amt);
        }, 0);
    }
    function tripTotal(t) {
        return t.sections.reduce(function(s, sec) {
            return s + sec.items.reduce(function(ss, it) {
                return ss + toNum(it.amt);
            }, 0);
        }, 0);
    }
    function secTotal(sec) {
        return sec.items.reduce(function(s, it) {
            return s + toNum(it.amt);
        }, 0);
    }

    function saveIncome(val) {
        getMonthData(currentMonth).income = val;
        saveData();
    }

    function setMonth(mk) {
        getMonthData(currentMonth).income = document.getElementById('income').value;
        currentMonth = mk;
        document.getElementById('income').value = getMonthData(mk).income || '3300';
        calc();
        saveData();
    }

    function setSection(s) {
        getMonthData(currentMonth).income = document.getElementById('income').value;
        section = s;
        var tabs = document.querySelectorAll('.sec-tab');
        for (var i = 0; i < tabs.length; i++)
            tabs[i].classList.remove('active');
        document.querySelector('.sec-tab.' + s).classList.add('active');
        document.getElementById('content').className = 'content ' + (s === 'budget' ? 'budget-bg' : 'travel-bg');
        render();
        saveData();
    }

    function calc() {
        render();
    }
    function render() {
        if (section === 'budget')
            renderBudget();
        else
            renderTravel();
    }
    function tw() {
        if (typeof twemoji !== 'undefined')
            twemoji.parse(document.body, {
                folder: 'svg',
                ext: '.svg'
            });
    }

    function renderMonthSelector() {
        var cur = null;
        for (var i = 0; i < MONTHS.length; i++)
            if (MONTHS[i].key === currentMonth)
                cur = MONTHS[i];
        var btns = '';
        for (var i = 0; i < MONTHS.length; i++) {
            var m = MONTHS[i];
            var d = allMonths[m.key];
            var hasData = false;
            if (d) {
                var bkeys = ['needs', 'wants', 'future'];
                outer:
                for (var b = 0; b < bkeys.length; b++) {
                    var items = d.buckets[bkeys[b]].items;
                    for (var j = 0; j < items.length; j++) {
                        if (toNum(items[j].amt) > 0) {
                            hasData = true;
                            break outer;
                        }
                    }
                }
            }
            btns += '<button class="month-btn'
            + (m.key === currentMonth ? ' active' : '')
            + (hasData ? ' has-data' : '')
            + '" onclick="setMonth(\'' + m.key + '\')">'
            + m.label + '<span class="month-year">' + m.year + '</span></button>';
        }
        return '<div class="month-selector">'
        + '<div class="month-selector-header">'
        + '<span class="month-selector-title">&#128197; Month</span>'
        + '<span class="month-badge">' + (cur ? cur.label + ' ' + cur.year : '') + '</span>'
        + '</div><div class="month-grid">' + btns + '</div></div>';
    }

    function renderBudget() {
        var income = getIncome();
        var nT = bucketTotal('needs'),
            wT = bucketTotal('wants'),
            fT = bucketTotal('future');
        var left = income - nT - wT - fT;
        var nI = income * 0.5,
            wI = income * 0.3,
            fI = income * 0.2;
        var nP = income > 0 ? Math.round(nT / income * 100) : 0;
        var wP = income > 0 ? Math.round(wT / income * 100) : 0;
        var fP = income > 0 ? Math.round(fT / income * 100) : 0;
        var lP = income > 0 ? Math.round(Math.abs(left) / income * 100) : 0;
        var neg = left < 0;
        var cur = null;
        for (var i = 0; i < MONTHS.length; i++)
            if (MONTHS[i].key === currentMonth)
                cur = MONTHS[i];

        var html = renderMonthSelector();
        html += '<div class="summary-box">'
        + '<h2>&#9889; Summary &mdash; ' + (cur ? cur.label + ' ' + cur.year : '') + '</h2>'
        + '<div class="split-grid">'
        + '<div class="split-card needs"><span class="split-label">Needs 50%</span><span class="split-amount">' + fmt(nT) + ' &euro;</span><span class="split-pct">' + nP + '% used</span><span class="split-ideal">Target: ' + fmt(nI) + ' &euro;</span></div>'
        + '<div class="split-card wants"><span class="split-label">Wants 30%</span><span class="split-amount">' + fmt(wT) + ' &euro;</span><span class="split-pct">' + wP + '% used</span><span class="split-ideal">Target: ' + fmt(wI) + ' &euro;</span></div>'
        + '<div class="split-card future"><span class="split-label">Future Me 20%</span><span class="split-amount">' + fmt(fT) + ' &euro;</span><span class="split-pct">' + fP + '% used</span><span class="split-ideal">Target: ' + fmt(fI) + ' &euro;</span></div>'
        + '<div class="split-card left' + (neg ? ' neg' : '') + '"><span class="split-label">Remaining</span><span class="split-amount">' + (neg ? '-' : '+') + fmt(Math.abs(left)) + ' &euro;</span><span class="split-pct">' + (neg ? '-' : '+') + lP + '%</span><span class="split-ideal">Goal: 0</span></div>'
        + '</div>'
        + '<div class="progress-section">'
        + '<div class="prog-row"><div class="prog-header"><span class="prog-label">&#127968; Needs</span><span class="prog-vals">' + fmt(nT) + ' / ' + fmt(nI) + ' &euro;</span></div><div class="prog-track"><div class="prog-fill ' + (nT > nI ? 'over' : 'needs') + '" style="width:' + Math.min(100, income > 0 ? nT / nI * 100 : 0) + '%"></div></div></div>'
        + '<div class="prog-row"><div class="prog-header"><span class="prog-label">&#128717; Wants</span><span class="prog-vals">' + fmt(wT) + ' / ' + fmt(wI) + ' &euro;</span></div><div class="prog-track"><div class="prog-fill ' + (wT > wI ? 'over' : 'wants') + '" style="width:' + Math.min(100, income > 0 ? wT / wI * 100 : 0) + '%"></div></div></div>'
        + '<div class="prog-row"><div class="prog-header"><span class="prog-label">&#128640; Future Me</span><span class="prog-vals">' + fmt(fT) + ' / ' + fmt(fI) + ' &euro;</span></div><div class="prog-track"><div class="prog-fill ' + (fT > fI ? 'over' : 'future') + '" style="width:' + Math.min(100, income > 0 ? fT / fI * 100 : 0) + '%"></div></div></div>'
        + '</div></div>';
        html += renderBucket('needs', nT);
        html += renderBucket('wants', wT);
        html += renderBucket('future', fT);
        document.getElementById('content').innerHTML = html;
        setTimeout(tw, 50);
    }

    function renderBucket(key, total) {
        var b = B()[key];
        var rows = '';
        for (var i = 0; i < b.items.length; i++) {
            var it = b.items[i];
            rows += '<div class="item-row">'
            + '<span class="item-dot ' + key + '"></span>'
            + '<input class="item-name" type="text" placeholder="Add expense..." value="' + it.name + '" data-key="' + key + '" data-idx="' + i + '" onchange="updateName(this)">'
            + '<input class="item-amount" type="text" inputmode="decimal" placeholder="0.00" value="' + (it.amt || '') + '" data-key="' + key + '" data-idx="' + i + '" onblur="updateAmt(this)">'
            + '<span class="item-currency">&euro;</span>'
            + '<button class="del-btn" data-key="' + key + '" data-idx="' + i + '" onclick="delItem(this)">&times;</button>'
            + '</div>';
        }
        var undo = b.items.length > 1
        ? '<button class="undo-btn" data-key="' + key + '" onclick="undoItem(this)">&#8617; Undo last</button>'
        : '';
        return '<div class="bucket" id="bucket-' + key + '">'
        + '<div class="bucket-header" onclick="toggleBucket(\'' + key + '\')">'
        + '<div class="bucket-title-wrap">'
        + '<span class="bucket-icon">' + b.icon + '</span>'
        + '<span class="bucket-title">' + b.label + '</span>'
        + '<span class="bucket-badge ' + key + '">' + b.pct + '%</span>'
        + '</div>'
        + '<div style="display:flex;align-items:center;gap:6px">'
        + '<span class="bucket-total">' + fmt(total) + ' &euro;</span>'
        + '<span class="bucket-chevron">&#9660;</span>'
        + '</div></div>'
        + '<div class="bucket-body"><div class="items-wrap">' + rows + '</div>'
        + '<div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap;padding-top:4px">'
        + '<button class="add-btn ' + key + '" data-key="' + key + '" onclick="addItem(this)">+ Add a line</button>'
        + undo
        + '</div></div></div>';
    }

    function updateName(el) {
        B()[el.dataset.key].items[parseInt(el.dataset.idx)].name = el.value;
        saveData();
    }
    function updateAmt(el) {
        var val = (el.value + '').replace(',', '.');
        var n = parseFloat(val) || 0;
        B()[el.dataset.key].items[parseInt(el.dataset.idx)].amt = n ? n : '';
        calc();
        saveData();
    }
    function toggleBucket(k) {
        document.getElementById('bucket-' + k).classList.toggle('collapsed');
    }
    function addItem(el) {
        B()[el.dataset.key].items.push({
            name: '',
            amt: ''
        });
        calc();
        saveData();
    }
    function delItem(el) {
        var b = B()[el.dataset.key];
        if (b.items.length > 1) {
            b.items.splice(parseInt(el.dataset.idx), 1);
        }
        calc();
        saveData();
    }
    function undoItem(el) {
        var b = B()[el.dataset.key];
        if (b.items.length > 1) {
            b.items.pop();
        }
        calc();
        saveData();
    }

    function renderTravel() {
        var grand = 0;
        for (var i = 0; i < trips.length; i++)
            grand += tripTotal(trips[i]);
        var cards = '';
        for (var ti = 0; ti < trips.length; ti++) {
            var t = trips[ti];
            var total = tripTotal(t);
            var secs = '';
            for (var si = 0; si < t.sections.length; si++) {
                var sec = t.sections[si];
                var st = secTotal(sec);
                var rows = '';
                for (var ii = 0; ii < sec.items.length; ii++) {
                    var it = sec.items[ii];
                    rows += '<div class="vac-item-row">'
                    + '<span class="vac-dot"></span>'
                    + '<input class="vac-item-name" type="text" placeholder="Description..." value="' + it.name + '" data-ti="' + ti + '" data-si="' + si + '" data-ii="' + ii + '" onchange="updateVacName(this)">'
                    + '<input class="vac-item-amount" type="text" inputmode="decimal" placeholder="0.00" value="' + (it.amt || '') + '" data-ti="' + ti + '" data-si="' + si + '" data-ii="' + ii + '" onblur="updateVacAmt(this)">'
                    + '<span class="vac-currency">&euro;</span>'
                    + '<button class="vac-del-btn" data-ti="' + ti + '" data-si="' + si + '" data-ii="' + ii + '" onclick="delVacItem(this)">&times;</button>'
                    + '</div>';
                }
                var undoBtn = sec.items.length > 1
                ? '<button class="undo-btn" style="color:#1e3a5f" data-ti="' + ti + '" data-si="' + si + '" onclick="undoVac(this)">&#8617; Undo last</button>'
                : '';
                secs += '<div class="trip-section">'
                + '<div class="trip-section-label"><span>' + sec.title + '</span><span class="trip-section-sub">' + fmt(st) + ' &euro;</span></div>'
                + rows
                + '<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">'
                + '<button class="vac-add-btn" data-ti="' + ti + '" data-si="' + si + '" onclick="addVacItem(this)">+ Add</button>'
                + undoBtn + '</div></div>';
            }
            var chips = '';
            for (var si2 = 0; si2 < t.sections.length; si2++) {
                var st2 = secTotal(t.sections[si2]);
                if (st2 > 0)
                    chips += '<span class="chip">' + t.sections[si2].title + ' ' + fmt(st2) + ' &euro;</span>';
            }
            var delBtn = trips.length > 1
            ? '<button class="del-trip-btn" data-ti="' + ti + '" onclick="delTrip(this)">&#128465; Delete trip</button>'
            : '';
            cards += '<div class="trip-card">'
            + '<div class="trip-header">'
            + '<input class="trip-name-input" type="text" placeholder="Trip name..." value="' + t.name + '" data-ti="' + ti + '" onchange="updateTripName(this)">'
            + '<span class="trip-total-badge">' + fmt(total) + ' &euro;</span>'
            + '</div>' + secs
            + (chips ? '<div class="trip-chips">' + chips + '</div>' : '')
            + delBtn + '</div>';
        }
        document.getElementById('content').innerHTML =
        '<div class="vac-header-box"><h2>&#9992; Travel Planner</h2><p>Break down each trip by category. Total updates when you leave a field.</p></div>'
        + '<div class="grand-total-bar"><span class="grand-total-label">&#128184; Total all trips</span><span class="grand-total-amount">' + fmt(grand) + ' &euro;</span></div>'
        + cards
        + '<button class="add-trip-btn" onclick="addTrip()">+ Add a trip</button>';
        setTimeout(tw, 50);
    }

    function updateVacName(el) {
        trips[el.dataset.ti].sections[el.dataset.si].items[el.dataset.ii].name = el.value;
        saveData();
    }
    function updateVacAmt(el) {
        var n = parseFloat((el.value + '').replace(',', '.')) || 0;
        trips[el.dataset.ti].sections[el.dataset.si].items[el.dataset.ii].amt = n ? n : '';
        calc();
        saveData();
    }
    function updateTripName(el) {
        trips[el.dataset.ti].name = el.value;
        saveData();
    }
    function addVacItem(el) {
        trips[el.dataset.ti].sections[el.dataset.si].items.push({
            name: '',
            amt: ''
        });
        calc();
        saveData();
    }
    function undoVac(el) {
        var s = trips[el.dataset.ti].sections[el.dataset.si];
        if (s.items.length > 1) {
            s.items.pop();
        }
        calc();
        saveData();
    }
    function delVacItem(el) {
        var s = trips[el.dataset.ti].sections[el.dataset.si];
        if (s.items.length > 1) {
            s.items.splice(parseInt(el.dataset.ii), 1);
        }
        calc();
        saveData();
    }
    function delTrip(el) {
        if (trips.length > 1) {
            trips.splice(parseInt(el.dataset.ti), 1);
        }
        calc();
        saveData();
    }
    function addTrip() {
        trips.push({
            name: 'New trip',
            sections: [
            {
                title: 'Flights',
                items: [{
                    name: '',
                    amt: ''
                }]
            },
            {
                title: 'Accommodation',
                items: [{
                    name: '',
                    amt: ''
                }]
            },
            {
                title: 'Transport',
                items: [{
                    name: '',
                    amt: ''
                }]
            },
            {
                title: 'Food',
                items: [{
                    name: '',
                    amt: ''
                }]
            },
            {
                title: 'Activities',
                items: [{
                    name: '',
                    amt: ''
                }]
            },
            {
                title: 'Shopping',
                items: [{
                    name: '',
                    amt: ''
                }]
            }
            ]
        });
        calc();
        saveData();
    }

    function saveData() {
        try {
            getMonthData(currentMonth).income = document.getElementById('income').value;
            localStorage.setItem('ib_months', JSON.stringify(allMonths));
            localStorage.setItem('ib_curmonth', currentMonth);
            localStorage.setItem('ib_trips', JSON.stringify(trips));
            localStorage.setItem('ib_section', section);
        } catch (e) {}
    }

    function loadData() {
        try {
            var am = localStorage.getItem('ib_months');
            if (am)
                allMonths = JSON.parse(am);
            var cm = localStorage.getItem('ib_curmonth');
            if (cm)
                currentMonth = cm;
            document.getElementById('income').value = getMonthData(currentMonth).income || '3300';
            var tr = localStorage.getItem('ib_trips');
            if (tr)
                trips = JSON.parse(tr);
            var sec = localStorage.getItem('ib_section');
            if (sec) {
                section = sec;
                var tabs = document.querySelectorAll('.sec-tab');
                for (var i = 0; i < tabs.length; i++)
                    tabs[i].classList.remove('active');
                document.querySelector('.sec-tab.' + sec).classList.add('active');
                document.getElementById('content').className = 'content ' + (sec === 'budget' ? 'budget-bg' : 'travel-bg');
            }
        } catch (e) {}
    }

    function resetData() {
        if (!confirm('Clear all data and start over?'))
            return;
        try {
            localStorage.clear();
        } catch (e) {}
        location.reload();
    }

    function isPWA() {
        return window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
    }
    function updateNav(s) {
        var tabs = document.querySelectorAll('.pwa-nav-btn');
        for (var i = 0; i < tabs.length; i++)
            tabs[i].classList.remove('active');
        var id = s === 'budget' ? 'navBudget' : 'navTravel';
        var el = document.getElementById(id);
        if (el)
            el.classList.add('active');
    }
    if (isPWA()) {
        document.body.classList.add('is-pwa');
        var nav = document.getElementById('pwaNav');
        if (nav)
            nav.classList.add('visible');
    }

    loadData();
    render();
    document.addEventListener('DOMContentLoaded', function() {
        tw();
    });
    </script>
</body>
</html>
